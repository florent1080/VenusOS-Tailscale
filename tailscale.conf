# Tailscale configuration for VenusOS-Tailscale
#
# AUTHKEY : generate at https://login.tailscale.com/admin/settings/keys
#           Use "Reusable" + "No expiry" for a permanent install
#           Format: tskey-auth-xxxxxxxxxxxxxxxx-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
AUTHKEY=

# HOSTNAME : name shown in Tailscale admin console
HOSTNAME=venus-van
